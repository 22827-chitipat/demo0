<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประวัติส่วนตัว - ชิติพัทธ์ คงัจนทร์</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ตั้งค่าพื้นฐาน */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Kanit', sans-serif;
        }

        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        /* กล่อง Profile Card */
        .profile-card {
            background-color: #ffffff;
            width: 100%;
            max-width: 400px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .profile-card:hover {
            transform: translateY(-5px);
        }

        /* ส่วนหัวของการ์ด (สีดำตามสีที่ชอบ) */
        .card-header {
            background-color: #1a1a1a;
            color: #ffffff;
            padding: 40px 20px 60px;
            position: relative;
        }

        .card-header h1 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .card-header p {
            font-size: 16px;
            font-weight: 300;
            color: #cccccc;
        }

        /* รูปโปรไฟล์ / ไอคอนแทนรูป */
        .profile-img {
            width: 100px;
            height: 100px;
            background-color: #ffffff;
            color: #1a1a1a;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            border: 4px solid #ffffff;
        }

        /* ส่วนข้อมูลส่วนตัว */
        .card-body {
            padding: 70px 30px 40px;
        }

        .info-list {
            list-style: none;
            text-align: left;
        }

        .info-list li {
            background-color: #f9f9f9;
            margin-bottom: 15px;
            padding: 15px 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            font-size: 16px;
            color: #444;
            transition: background-color 0.2s ease;
        }

        .info-list li:hover {
            background-color: #f1f1f1;
        }

        .info-list li i {
            width: 30px;
            font-size: 18px;
            color: #1a1a1a; /* ไอคอนสีดำ */
            margin-right: 15px;
            text-align: center;
        }

        /* ป้ายกำกับข้อมูล */
        .label {
            font-weight: 600;
            margin-right: 8px;
            color: #1a1a1a;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="card-header">
            <h1>นาย ชิติพัทธ์ คงัจนทร์</h1>
            <p>ชื่อเล่น: ยูโร</p>
            <div class="profile-img">
                <i class="fa-solid fa-user-astronaut"></i>
            </div>
        </div>
        
        <div class="card-body">
            <ul class="info-list">
                <li>
                    <i class="fa-solid fa-cake-candles"></i>
                    <div><span class="label">วันเกิด:</span> 21 กุมภาพันธ์ 2555</div>
                </li>
                <li>
                    <i class="fa-solid fa-utensils"></i>
                    <div><span class="label">อาหารที่ชอบ:</span> ข้าวผัดกะเพรา</div>
                </li>
                <li>
                    <i class="fa-solid fa-palette"></i>
                    <div><span class="label">สีที่ชอบ:</span> ดำ</div>
                </li>
                <li>
                    <i class="fa-solid fa-computer"></i>
                    <div><span class="label">วิชาที่ชอบ:</span> คอมพิวเตอร์</div>
                </li>
                <li>
                    <i class="fa-solid fa-user-group"></i>
                    <div><span class="label">เพื่อนสนิท:</span> ติ๋ว</div>
                </li>
            </ul>
        </div>
    </div>

</body>
</html>
