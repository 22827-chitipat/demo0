<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | ชิติพัทธ์ คงจันทร์ (ยูโร)</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Prompt', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1f1f21 0%, #111112 100%);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .profile-card {
            background: rgba(40, 40, 43, 0.75);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            width: 100%;
            max-width: 480px;
            padding: 35px 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .profile-card:hover {
            transform: translateY(-5px);
        }

        /* Avatar Section */
        .avatar-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            background: linear-gradient(45deg, #555, #222);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 3px solid #444;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }

        .avatar-wrapper i {
            font-size: 55px;
            color: #b3b3b3;
        }

        /* Name & Nickname */
        .profile-card h1 {
            font-size: 1.6rem;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .nickname {
            font-size: 1rem;
            color: #a0a0a0;
            font-weight: 300;
            margin-bottom: 30px;
            display: inline-block;
            background: #333336;
            padding: 4px 16px;
            border-radius: 20px;
            border: 1px solid #444;
        }

        /* Info Details */
        .info-container {
            text-align: left;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .info-item {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 14px 18px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: background 0.2s ease;
        }

        .info-item:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .info-item i {
            font-size: 1.2rem;
            width: 35px;
            color: #cccccc;
            text-align: center;
            margin-right: 15px;
        }

        .info-content {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-size: 0.8rem;
            color: #888888;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .info-value {
            font-size: 1rem;
            color: #e5e5e5;
            font-weight: 400;
        }

        /* Special Badges for Colors & Subjects */
        .badge {
            background: #444446;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.9rem;
            margin-right: 5px;
            border: 1px solid #555;
            display: inline-block;
        }

        .color-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 6px;
            vertical-align: middle;
            border: 1px solid #777;
        }
        .dot-black { background-color: #000; }
        .dot-gray { background-color: #808080; }

        /* Footer Accent */
        .footer-line {
            margin-top: 30px;
            font-size: 0.75rem;
            color: #555;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="avatar-wrapper">
            <i class="fa-solid fa-user-astronaut"></i>
        </div>
        <h1>นาย ชิติพัทธ์ คงจันทร์</h1>
        <span class="nickname">ชื่อเล่น: ยูโร</span>

        <div class="info-container">
            
            <div class="info-item">
                <i class="fa-solid fa-cake-candles"></i>
                <div class="info-content">
                    <span class="info-label">วันเกิด</span>
                    <span class="info-value">28 กรกฎาคม 2535</span>
                </div>
            </div>

            <div class="info-item">
                <i class="fa-solid fa-utensils"></i>
                <div class="info-content">
                    <span class="info-label">อาหารที่ชอบ</span>
                    <span class="info-value">ข้าวมันไก่ 🍗</span>
                </div>
            </div>

            <div class="info-item">
                <i class="fa-solid fa-palette"></i>
                <div class="info-content">
                    <span class="info-label">สีที่ชอบ</span>
                    <span class="info-value">
                        <span class="badge"><span class="color-dot dot-black"></span>สีดำ</span>
                        <span class="badge"><span class="color-dot dot-gray"></span>สีเทา</span>
                    </span>
                </div>
            </div>

            <div class="info-item">
                <i class="fa-solid fa-graduation-cap"></i>
                <div class="info-content">
                    <span class="info-label">วิชาที่ชอบ</span>
                    <span class="info-value">คณิตศาสตร์ , วิทยาศาสตร์</span>
                </div>
            </div>

            <div class="info-item">
                <i class="fa-solid fa-user-group"></i>
                <div class="info-content">
                    <span class="info-label">เพื่อนสนิท</span>
                    <span class="info-value">โกกิ</span>
                </div>
            </div>

        </div>

        <div class="footer-line">
            © 2026 CHITIPHAT KONGJAN
        </div>
    </div>

</body>
</html>
